<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quick Notes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 10px;
            font-size: 16px;
            resize: none;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }

        #status {
            margin-top: 10px;
            color: green;
        }
    </style>
</head>

<body>

<h2>Quick Note</h2>

<textarea
    id="noteInput"
    placeholder="Type your note here..."
></textarea>

<br>

<button id="saveBtn">
    Save Note
</button>

<div id="status"></div>

<script src="renderer.js"></script>

</body>
</html>
